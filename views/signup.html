<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 30px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        .logout {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: red;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

        .logout:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h2>Student Dashboard</h2>
</div>

<div class="container">
    <div class="card">
        <h3>Welcome 🎉</h3>
        <p>You are successfully logged in.</p>

        <a href="/logout" class="logout">Logout</a>
    </div>
</div>

</body>
</html>
